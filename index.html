<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARTY TOKYO — ご招待</title>
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8D08A;--gold-dim:#7a6230;
  --black:#080808;--dark:#111111;--dark2:#191919;
  --white:#F5F0E8;--gray:#888880;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-weight:300;min-height:100vh;}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 60% 40%,rgba(201,168,76,0.05) 0%,transparent 70%);}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:48px 24px 80px;}

.header{text-align:center;margin-bottom:48px;}
.logo{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.5rem;color:var(--gold);letter-spacing:0.4em;margin-bottom:6px;}
.logo-sub{font-size:0.52rem;letter-spacing:0.35em;color:var(--gray);text-transform:uppercase;}
.event-info{margin-top:20px;padding:16px 20px;border:1px solid rgba(201,168,76,0.2);background:rgba(201,168,76,0.04);}
.event-name{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.1rem;color:var(--gold);}
.event-date{font-size:0.65rem;color:var(--gray);margin-top:4px;letter-spacing:0.1em;}
.event-description{font-size:0.75rem;color:var(--gray);margin-top:10px;line-height:1.8;white-space:pre-line;border-top:1px solid rgba(201,168,76,0.15);padding-top:10px;}
.invite-type{display:inline-block;margin-top:10px;padding:3px 12px;font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;border:1px solid;font-weight:500;}
.type-free{color:#9B8EC4;border-color:rgba(155,142,196,0.5);background:rgba(155,142,196,0.08);}
.type-paid{color:var(--gold);border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.06);}

.form-section{margin-bottom:28px;}
.form-label{display:block;font-size:0.55rem;letter-spacing:0.25em;color:var(--gray);text-transform:uppercase;margin-bottom:10px;}
.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:12px 0;color:var(--white);font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:1rem;outline:none;transition:border-color 0.3s;}
.form-input:focus{border-bottom-color:var(--gold);}
.form-input::placeholder{color:rgba(255,255,255,0.2);}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.06);}
.gender-btn{background:var(--dark);padding:14px;text-align:center;cursor:pointer;font-size:0.65rem;letter-spacing:0.15em;color:var(--gray);transition:all 0.2s;border:none;}
.gender-btn.active{background:rgba(201,168,76,0.1);color:var(--gold);}
.btn-submit{width:100%;margin-top:8px;background:var(--gold);border:none;cursor:pointer;padding:18px;color:var(--black);font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;transition:all 0.3s;}
.btn-submit:hover{background:var(--gold-light);}
.btn-submit:disabled{opacity:0.4;cursor:not-allowed;}
.error-msg{color:#CF4444;font-size:0.68rem;margin-top:10px;display:none;}

#result{display:none;}
.result-header{text-align:center;margin-bottom:32px;}
.result-title{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.4rem;color:var(--gold);margin-bottom:8px;}
.result-sub{font-size:0.62rem;color:var(--gray);letter-spacing:0.12em;line-height:1.8;}
.qr-box{background:var(--dark);border:1px solid rgba(201,168,76,0.25);padding:32px;text-align:center;margin-bottom:20px;}
.qr-inner{background:#fff;display:inline-block;padding:16px;margin-bottom:20px;}
#qr-container canvas, #qr-container img{display:block;}
.guest-id-label{font-size:0.48rem;letter-spacing:0.3em;color:var(--gray);text-transform:uppercase;margin-bottom:6px;}
.guest-id-val{font-family:monospace;font-size:1.4rem;color:var(--gold);letter-spacing:0.15em;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.7rem;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--gray);}
.info-val{color:var(--white);}
.mail-notice{margin-top:20px;padding:14px 16px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);font-size:0.62rem;color:var(--gray);line-height:1.8;text-align:center;}

#loading-screen{text-align:center;padding:80px 24px;}
.loading-logo{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.4rem;color:var(--gold);letter-spacing:0.4em;margin-bottom:8px;}
.loading-txt{font-size:0.6rem;color:var(--gray);letter-spacing:0.2em;}
#error-screen{display:none;text-align:center;padding:80px 24px;}
.error-title{font-size:0.55rem;letter-spacing:0.3em;color:#CF4444;text-transform:uppercase;margin-bottom:12px;}
.error-body{font-size:0.85rem;color:var(--gray);line-height:1.8;}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div id="loading-screen">
  <div class="loading-logo">LUXE PARTY TOKYO</div>
  <div class="loading-txt">読み込み中…</div>
</div>

<div id="error-screen">
  <div class="error-title">Invalid URL</div>
  <div class="error-body">招待URLが正しくありません。<br>プロモーターから受け取ったURLをご確認ください。</div>
</div>

<div class="wrap" id="form-screen" style="display:none;">
  <div class="header">
    <div class="logo">LUXE PARTY TOKYO</div>
    <div class="logo-sub">Invitation</div>
    <div class="event-info" id="event-info">
      <div class="event-name" id="ev-name">—</div>
      <div class="event-date" id="ev-date">—</div>
      <div class="event-description" id="ev-description" style="display:none;"></div>
      <span class="invite-type" id="invite-type-badge">—</span>
    </div>
  </div>

  <div class="form-section">
    <label class="form-label">お名前</label>
    <input class="form-input" id="f-name" placeholder="山田 太郎" autocomplete="name">
  </div>
  <div class="form-section">
    <label class="form-label">メールアドレス</label>
    <input class="form-input" id="f-email" type="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="form-section">
    <label class="form-label">性別</label>
    <div class="gender-row">
      <button class="gender-btn" id="g-male"   onclick="selectGender('male')">男性</button>
      <button class="gender-btn" id="g-female" onclick="selectGender('female')">女性</button>
    </div>
  </div>
  <div class="form-section">
    <label class="form-label">招待者名（プロモーター名）</label>
    <input class="form-input" id="f-invited-by" placeholder="紹介してくれた方のお名前">
  </div>

  <button class="btn-submit" id="btn-submit" onclick="submitForm()">申し込む</button>
  <div class="error-msg" id="form-error">入力内容をご確認ください</div>
</div>

<div class="wrap" id="result">
  <div class="result-header">
    <div class="result-title">ご登録ありがとうございます</div>
    <div class="result-sub">当日は下記のQRコードをスタッフにご提示ください<br>このページのスクリーンショットを保存しておくと安心です</div>
  </div>
  <div class="qr-box">
    <div class="qr-inner">
      <div id="qr-container"></div>
    </div>
    <div class="guest-id-label">Guest ID</div>
    <div class="guest-id-val" id="res-guest-id">—</div>
  </div>
  <div>
    <div class="info-row"><span class="info-key">お名前</span><span class="info-val" id="res-name">—</span></div>
    <div class="info-row"><span class="info-key">イベント</span><span class="info-val" id="res-event">—</span></div>
    <div class="info-row"><span class="info-key">種別</span><span class="info-val" id="res-type">—</span></div>
    <div class="info-row" id="res-amount-row" style="display:none"><span class="info-key">入場料</span><span class="info-val" id="res-amount">—</span></div>
    <div class="info-row"><span class="info-key">招待者</span><span class="info-val" id="res-invited-by">—</span></div>
  </div>
  <div class="mail-notice">📧 登録メールアドレスにQRコードを送信しました</div>
</div>

<!-- QRコード生成（SVG・外部ライブラリ不使用） -->
<script>
// ── QR生成エンジン ──────────────────────────────────────────
(function(g){
  // GF(256) 初期化
  var EXP=new Array(512), LOG=new Array(256);
  var x=1;
  for(var i=0;i<256;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x>=256)x^=0x11d;}
  for(var i=255;i<512;i++)EXP[i]=EXP[i-255];
  EXP[0]=1; // 念のため

  function mul(a,b){return(a&&b)?EXP[LOG[a]+LOG[b]]:0;}

  function rsEC(data,n){
    // ジェネレータ多項式
    var gen=[1];
    for(var i=0;i<n;i++){
      var g2=[1,EXP[i]];
      var ng=new Array(gen.length+1).fill(0);
      for(var j=0;j<gen.length;j++)for(var k=0;k<g2.length;k++)ng[j+k]^=mul(gen[j],g2[k]);
      gen=ng;
    }
    var msg=data.concat(new Array(n).fill(0));
    for(var i=0;i<data.length;i++){
      var c=msg[i];
      if(c)for(var j=0;j<gen.length;j++)msg[i+j]^=mul(c,gen[j]);
    }
    return msg.slice(data.length);
  }

  // バージョン/ECL=M の DC容量
  var DC_CAP=[0,16,28,44,64,86];
  // ECブロック数とEC codewords/block
  var EC_PER=[0,10,16,26,18,24];

  g.makeQRSvg = function(text){
    // UTF-8 エンコード
    var bytes=[];
    for(var i=0;i<text.length;i++){
      var c=text.charCodeAt(i);
      if(c<0x80)bytes.push(c);
      else if(c<0x800){bytes.push(0xC0|(c>>6));bytes.push(0x80|(c&0x3F));}
      else{bytes.push(0xE0|(c>>12));bytes.push(0x80|((c>>6)&0x3F));bytes.push(0x80|(c&0x3F));}
    }

    // バージョン選択 (ECL=M)
    var ver=1;
    for(var v=1;v<=5;v++){if(bytes.length<=DC_CAP[v]-3){ver=v;break;}}
    if(bytes.length>DC_CAP[5]-3)return null; // 長すぎ

    var dcTotal=DC_CAP[ver];
    var ecN=EC_PER[ver];

    // ビット列構築
    var bits=[];
    function pushBits(val,n){for(var i=n-1;i>=0;i--)bits.push((val>>i)&1);}
    pushBits(4,4);           // バイトモード
    pushBits(bytes.length,8);
    for(var i=0;i<bytes.length;i++)pushBits(bytes[i],8);
    // ターミネータ
    for(var i=0;i<4&&bits.length<dcTotal*8;i++)bits.push(0);
    while(bits.length%8)bits.push(0);
    var PAD=[0xEC,0x11],pi=0;
    while(bits.length<dcTotal*8){pushBits(PAD[pi%2],8);pi++;}

    // バイト化
    var dc=[];
    for(var i=0;i<bits.length;i+=8){var v=0;for(var j=0;j<8;j++)v=(v<<1)|bits[i+j];dc.push(v);}

    // EC生成 (単一ブロック)
    var ec=rsEC(dc,ecN);
    var cw=dc.concat(ec);

    // マトリクス構築
    var N=ver*4+17;
    var mat=[];var used=[];
    for(var i=0;i<N;i++){mat.push(new Array(N).fill(0));used.push(new Array(N).fill(false));}

    function setM(r,c,v){mat[r][c]=v?1:0;used[r][c]=true;}
    function inBounds(r,c){return r>=0&&r<N&&c>=0&&c<N;}

    // ファインダーパターン
    var FP=[[0,0],[0,N-7],[N-7,0]];
    for(var f=0;f<FP.length;f++){
      var br=FP[f][0],bc=FP[f][1];
      for(var r=0;r<7;r++)for(var c=0;c<7;c++){
        setM(br+r,bc+c,(r===0||r===6||c===0||c===6||( r>=2&&r<=4&&c>=2&&c<=4))?1:0);
      }
      // セパレータ
      for(var i=-1;i<=7;i++){
        if(inBounds(br+i,bc-1))setM(br+i,bc-1,0);
        if(inBounds(br+i,bc+7))setM(br+i,bc+7,0);
        if(inBounds(br-1,bc+i))setM(br-1,bc+i,0);
        if(inBounds(br+7,bc+i))setM(br+7,bc+i,0);
      }
    }

    // タイミングパターン
    for(var i=8;i<N-8;i++){setM(6,i,i%2===0?1:0);setM(i,6,i%2===0?1:0);}

    // アライメントパターン (ver>=2)
    var APT=[[],[],[6,18],[6,22],[6,26],[6,30]];
    var ap=APT[ver]||[];
    for(var ai=0;ai<ap.length;ai++)for(var aj=0;aj<ap.length;aj++){
      var ar=ap[ai],ac=ap[aj];
      if(used[ar][ac])continue;
      for(var dr=-2;dr<=2;dr++)for(var dc2=-2;dc2<=2;dc2++)
        setM(ar+dr,ac+dc2,(Math.abs(dr)===2||Math.abs(dc2)===2||(!dr&&!dc2))?1:0);
    }

    // ダークモジュール
    setM(4*ver+9,8,1);

    // フォーマット情報領域を予約
    var FMT1=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    var FMT2=[[N-1,8],[N-2,8],[N-3,8],[N-4,8],[N-5,8],[N-6,8],[N-7,8],[8,N-8],[8,N-7],[8,N-6],[8,N-5],[8,N-4],[8,N-3],[8,N-2],[8,N-1]];
    for(var i=0;i<FMT1.length;i++)used[FMT1[i][0]][FMT1[i][1]]=true;
    for(var i=0;i<FMT2.length;i++)used[FMT2[i][0]][FMT2[i][1]]=true;

    // データ配置
    var dataBits=[];
    for(var i=0;i<cw.length;i++)for(var b=7;b>=0;b--)dataBits.push((cw[i]>>b)&1);
    var bi=0,upward=true,col=N-1;
    while(col>0){
      if(col===6)col--;
      for(var i=0;i<N;i++){
        var row=upward?(N-1-i):i;
        for(var dc3=0;dc3<2;dc3++){
          var c2=col-dc3;
          if(!used[row][c2]){mat[row][c2]=dataBits[bi]||0;bi++;}
        }
      }
      upward=!upward;col-=2;
    }

    // マスク評価 (マスク0固定で簡略化 - 実用上問題なし)
    var MASK=0;
    for(var r=0;r<N;r++)for(var c=0;c<N;c++){
      if(used[r][c])continue;
      if((r+c)%2===0)mat[r][c]^=1;
    }

    // フォーマット情報書き込み (ECL=M:01, mask=0)
    var ecBits=1; // M=01 → MSB=0,LSB=1 → bits=01
    var raw=(ecBits<<3)|MASK; // 01 000
    var rem=raw<<10;
    for(var i=14;i>=10;i--)if((rem>>i)&1)rem^=(0x537<<(i-10));
    var fmt=((raw<<10)|rem)^0x5412;
    for(var i=0;i<15;i++){
      var b=(fmt>>(14-i))&1;
      mat[FMT1[i][0]][FMT1[i][1]]=b;
      mat[FMT2[i][0]][FMT2[i][1]]=b;
    }

    // SVG出力
    var cell=10,margin=4,size=(N+margin*2)*cell;
    var rects='';
    for(var r=0;r<N;r++)for(var c=0;c<N;c++)
      if(mat[r][c])rects+='<rect x="'+((c+margin)*cell)+'" y="'+((r+margin)*cell)+'" width="'+cell+'" height="'+cell+'"/>';
    return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><rect width="'+size+'" height="'+size+'" fill="#fff"/><g fill="#000">'+rects+'</g></svg>';
  };
})(window);
</script>
<script>
const API      = 'https://script.google.com/macros/s/AKfycbwlEtY2RZahMNrr6d5cYIcG8p3sXtNDh7_uC-79hC2G4H87Vy9k_cp_yFywmNc1Ogfe/exec';
const BASE_URL = 'https://luxepartycom.github.io/event-system/';

let currentEvent   = null;
let currentPayType = 'paid';
let selectedGender = '';

async function apiGet(p)  { const r=await fetch(API+'?'+new URLSearchParams(p)); return r.json(); }
async function apiPost(b) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(b)
  });
  return r.json();
}

window.addEventListener('load', async () => {
  fetch(API + '?action=ping').catch(()=>{});
  const params  = new URLSearchParams(location.search);
  const eventId = params.get('e') || '';
  const type    = params.get('type') || 'paid';

  if (!eventId) { showError('URLにイベントIDが含まれていません'); return; }

  try {
    const data = await apiGet({ action: 'getEvents' });
    const ev   = (data.events || []).find(e => e.event_id === eventId);
    if (!ev) { showError('イベントが見つかりません'); return; }
    if (String(ev.status) === 'closed') { showError('このイベントの受付は終了しました'); return; }

    currentEvent   = ev;
    currentPayType = type === 'free' ? 'free' : 'paid';

    document.getElementById('ev-name').textContent = ev.name;
    document.getElementById('ev-date').textContent = ev.date;
    const descEl = document.getElementById('ev-description');
    if (ev.description && ev.description.trim()) {
      descEl.textContent = ev.description.trim();
      descEl.style.display = 'block';
    } else {
      descEl.style.display = 'none';
    }
    const badge = document.getElementById('invite-type-badge');
    if (currentPayType === 'free') {
      badge.textContent = '無料招待';
      badge.className   = 'invite-type type-free';
    } else {
      const pm = Number(ev.price_male   || 0).toLocaleString();
      const pf = Number(ev.price_female || 0).toLocaleString();
      badge.textContent = `有料招待 男¥${pm} / 女¥${pf}`;
      badge.className   = 'invite-type type-paid';
    }

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('form-screen').style.display    = 'block';
  } catch(err) {
    showError('読み込みに失敗しました。しばらく経ってから再度お試しください。');
  }
});

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display   = 'block';
  document.querySelector('#error-screen .error-body').innerHTML = msg;
}

function selectGender(g) {
  selectedGender = g;
  document.getElementById('g-male').classList.toggle('active',   g === 'male');
  document.getElementById('g-female').classList.toggle('active', g === 'female');
}

async function submitForm() {
  const name      = document.getElementById('f-name').value.trim();
  const email     = document.getElementById('f-email').value.trim();
  const invitedBy = document.getElementById('f-invited-by').value.trim();
  const errEl     = document.getElementById('form-error');

  if (!name || !email || !selectedGender || !invitedBy) {
    errEl.textContent = 'すべての項目を入力してください';
    errEl.style.display = 'block';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'メールアドレスの形式が正しくありません';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('btn-submit');
  btn.disabled    = true;
  btn.textContent = '送信中…';

  try {
    const data = await apiPost({
      action:     'registerGuest',
      event_id:   currentEvent.event_id,
      name, email,
      gender:     selectedGender,
      invited_by: invitedBy,
      pay_type:   currentPayType
    });

    if (!data.ok) {
      errEl.textContent = data.message || 'エラーが発生しました';
      errEl.style.display = 'block';
      btn.disabled    = false;
      btn.textContent = '申し込む';
      return;
    }

    showResult(data, name, email, invitedBy);

    apiPost({
      action:     'sendQREmail',
      guest_id:   data.guest_id,
      email, name,
      pay_type:   data.pay_type,
      amount:     data.amount,
      event_name: currentEvent.name
    }).catch(()=>{});

  } catch(err) {
    errEl.textContent = '通信エラーが発生しました。再度お試しください。';
    errEl.style.display = 'block';
    btn.disabled    = false;
    btn.textContent = '申し込む';
  }
}

function showResult(data, name, email, invitedBy) {
  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('result').style.display      = 'block';

  document.getElementById('res-guest-id').textContent   = data.guest_id;
  document.getElementById('res-name').textContent       = name;
  document.getElementById('res-event').textContent      = currentEvent.name;
  document.getElementById('res-invited-by').textContent = invitedBy;

  if (data.pay_type === 'free') {
    document.getElementById('res-type').textContent = '無料招待';
  } else {
    document.getElementById('res-type').textContent = '有料招待';
    if (data.amount > 0) {
      document.getElementById('res-amount-row').style.display = 'flex';
      document.getElementById('res-amount').textContent = '¥' + Number(data.amount).toLocaleString();
    }
  }

  // SVGでQR生成（外部ライブラリ不使用・iOS Safari対応）
  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  try {
    const svg = makeQRSvg(data.guest_id);
    container.innerHTML = svg;
  } catch(e) {
    container.innerHTML = '<div style="padding:16px;font-family:monospace;font-size:14px;color:#000;word-break:break-all;">' + data.guest_id + '</div>';
  }
}
</script>
</body>
</html>
