<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARTY TOKYO — VIP テーブル予約</title>
<style>
:root{--gold:#C9A84C;--black:#080808;--dark:#111;--dark2:#161616;--white:#F5F0E8;--gray:#888880;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-weight:300;min-height:100vh;}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 20%,rgba(201,168,76,0.06) 0%,transparent 70%);}
.wrap{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;padding:48px 20px 80px;}
.logo{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.4em;text-align:center;margin-bottom:2px;}
.logo-sub{font-size:0.48rem;letter-spacing:0.3em;color:var(--gray);text-transform:uppercase;text-align:center;margin-bottom:32px;}
.page-title{font-size:0.6rem;letter-spacing:0.3em;color:var(--gold);text-align:center;margin-bottom:32px;text-transform:uppercase;}

/* Step indicator */
.steps{display:flex;justify-content:center;gap:0;margin-bottom:40px;}
.step{display:flex;align-items:center;gap:8px;font-size:0.52rem;letter-spacing:0.1em;color:#333;}
.step.active{color:var(--gold);}
.step.done{color:#555;}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.6rem;}
.step-line{width:32px;height:1px;background:#222;margin:0 4px;}

/* Floor map */
.map-wrap{margin-bottom:32px;}
.map-label{font-size:0.48rem;letter-spacing:0.2em;color:var(--gray);margin-bottom:10px;text-transform:uppercase;}
.map-svg-wrap{border:1px solid #1e1e1e;background:#0d0d0d;overflow:hidden;}
.map-svg-wrap svg{width:100%;height:auto;display:block;}

/* Table info card */
.table-card{display:none;background:var(--dark2);border:1px solid rgba(201,168,76,0.3);padding:16px;margin-bottom:20px;}
.table-card.visible{display:block;}
.tc-badge{font-size:0.45rem;letter-spacing:0.15em;padding:3px 8px;border:1px solid;display:inline-block;margin-bottom:8px;}
.tc-name{font-size:1.4rem;font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:var(--gold);margin-bottom:4px;}
.tc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.tc-item{background:#111;padding:10px;}
.tc-item-label{font-size:0.45rem;letter-spacing:0.1em;color:var(--gray);margin-bottom:4px;}
.tc-item-val{font-size:0.85rem;color:var(--white);}

/* Form */
.form-section{display:none;}
.form-section.visible{display:block;}
.form-group{margin-bottom:20px;}
.form-label{font-size:0.5rem;letter-spacing:0.15em;color:var(--gray);display:block;margin-bottom:8px;text-transform:uppercase;}
.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:10px 0;color:var(--white);font-family:inherit;font-size:0.8rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-bottom-color:var(--gold);}
.form-note{font-size:0.5rem;color:var(--gray);margin-top:6px;line-height:1.6;}
.pay-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.pay-opt{border:1px solid #222;padding:14px;cursor:pointer;transition:all 0.2s;}
.pay-opt:hover{border-color:#333;}
.pay-opt.selected{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.pay-opt-icon{font-size:1.2rem;margin-bottom:6px;}
.pay-opt-label{font-size:0.65rem;color:var(--white);font-weight:500;}
.pay-opt-desc{font-size:0.5rem;color:var(--gray);margin-top:3px;line-height:1.5;}

/* Buttons */
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;padding:16px;font-size:0.7rem;letter-spacing:0.2em;cursor:pointer;font-family:inherit;font-weight:500;margin-top:8px;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.88;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-secondary{width:100%;background:transparent;color:var(--gray);border:1px solid #222;padding:13px;font-size:0.62rem;cursor:pointer;font-family:inherit;margin-top:8px;transition:all 0.2s;}
.btn-secondary:hover{border-color:#333;color:var(--white);}

/* Result */
.result-section{display:none;text-align:center;}
.result-section.visible{display:block;}
.result-badge{background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.3);padding:14px;margin-bottom:24px;font-size:0.65rem;color:#4CAF82;line-height:1.8;}
.result-badge.transfer{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);color:var(--gold);}
.result-title{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.3rem;color:var(--gold);margin-bottom:8px;}
.result-sub{font-size:0.6rem;color:var(--gray);line-height:1.8;margin-bottom:28px;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.68rem;}
.info-key{color:var(--gray);}
.info-val{color:var(--white);}
.transfer-box{background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-top:20px;text-align:left;}
.transfer-title{font-size:0.5rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:10px;text-transform:uppercase;}
.transfer-body{font-size:0.65rem;color:var(--gray);line-height:2;}

/* Loading */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loading-overlay.visible{display:flex;}
.loading-text{font-size:0.6rem;letter-spacing:0.2em;color:var(--gray);}
.spinner{width:32px;height:32px;border:1px solid #222;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#error-msg{display:none;padding:12px 14px;background:rgba(207,68,68,0.1);border:1px solid rgba(207,68,68,0.3);font-size:0.62rem;color:#CF4444;line-height:1.7;margin-bottom:16px;}
</style>
</head>

    <!-- 選択テーブル情報 -->

        <div class="tc-item"><div class="tc-item-label">料金（税込）</div><div class="tc-item-val" id="tc-price" style="color:#C9A84C;"></div></div>
      </div>
      <div id="tc-status-msg" style="margin-top:12px;font-size:0.55rem;padding:8px;text-align:center;"></div>

    <div id="error-msg"></div>
    <button class="btn-primary" id="btn-to-step2" onclick="goToStep2()" disabled>このテーブルで予約に進む</button>

  <!-- Step2: お客様情報 -->
  <div class="form-section" id="step2">
    <div style="font-size:0.5rem;letter-spacing:0.15em;color:var(--gray);margin-bottom:20px;">選択テーブル: <span id="s2-table-name" style="color:var(--gold);"></span></div>

      <label class="form-label" for="inp-name">代表者氏名</label>

      <label class="form-label" for="inp-email">メールアドレス</label>

      <div class="form-note">QRコード招待状をお送りします</div>

      <label class="form-label" for="inp-phone">電話番号</label>
      <input class="form-input" id="inp-phone" type="tel" placeholder="09012345678" autocomplete="tel">

    <div class="form-group">
      <label class="form-label">お支払い方法</label>
      <div class="pay-options">
        <div class="pay-opt selected" id="pay-stripe" onclick="selectPay('stripe')">
          <div class="pay-opt-icon">💳</div>
          <div class="pay-opt-label">カード決済</div>
          <div class="pay-opt-desc">今すぐお支払い<br>予約確定</div>
        </div>
        <div class="pay-opt" id="pay-transfer" onclick="selectPay('transfer')">
          <div class="pay-opt-icon">🏦</div>
          <div class="pay-opt-label">銀行振込</div>
          <div class="pay-opt-desc">3日以内に振込<br>確認後QR発行</div>
        </div>
      </div>
    </div>
    <div id="error-msg2" style="display:none;padding:12px;background:rgba(207,68,68,0.1);border:1px solid rgba(207,68,68,0.3);font-size:0.62rem;color:#CF4444;line-height:1.7;margin-bottom:16px;"></div>
    <button class="btn-primary" onclick="submitReservation()">予約を確定する</button>
    <button class="btn-secondary" onclick="backToStep1()">← テーブルを変更する</button>
  </div>

  <!-- Result -->
  <div class="result-section" id="result-section">
    <div class="result-badge" id="res-badge"></div>
    <div class="result-title">ご予約ありがとうございます</div>
    <div class="result-sub" id="res-sub"></div>

      <div class="info-row"><span class="info-key">テーブル</span><span class="info-val" id="res-table"></span></div>
      <div class="info-row"><span class="info-key">代表者</span><span class="info-val" id="res-name"></span></div>
      <div class="info-row"><span class="info-key">料金</span><span class="info-val" id="res-price"></span></div>
      <div class="info-row"><span class="info-key">お支払い方法</span><span class="info-val" id="res-pay"></span></div>

    <div class="transfer-box" id="transfer-box" style="display:none;">
      <div class="transfer-title">振込のご案内</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwlEtY2RZahMNrr6d5cYIcG8p3sXtNDh7_uC-79hC2G4H87Vy9k_cp_yFywmNc1Ogfe/exec';
const VERCEL = 'https://event-system-kappa.vercel.app/api/checkout';

const TABLE_INFO = {
  S1:{name:'S1',type:'Secret VIP',cap:'5名',price:500000,stroke:'#CC2222',bg:'#4a0f0f',tc:'#ffcccc'},
  S2:{name:'S2',type:'Secret VIP',cap:'4名',price:300000,stroke:'#CC2222',bg:'#4a0f0f',tc:'#ffcccc'},
  S3:{name:'S3',type:'Secret VIP',cap:'5名',price:500000,stroke:'#CC2222',bg:'#4a0f0f',tc:'#ffcccc'},
  V1:{name:'V1',type:'VVIP',cap:'4名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  V2:{name:'V2',type:'VVIP',cap:'4名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  V3:{name:'V3',type:'VVIP',cap:'5名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  V4:{name:'V4',type:'VVIP',cap:'5名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  V5:{name:'V5',type:'VVIP',cap:'5名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  V6:{name:'V6',type:'VVIP',cap:'5名',price:300000,stroke:'#3355CC',bg:'#0F2461',tc:'#dbeafe'},
  G1:{name:'G1',type:'GOLD VIP',cap:'4〜5名',price:500000,stroke:'#B8860B',bg:'#3D2800',tc:'#fef3c7'},
  G2:{name:'G2',type:'GOLD VIP',cap:'4〜5名',price:500000,stroke:'#B8860B',bg:'#3D2800',tc:'#fef3c7'},
  D1:{name:'D1',type:'Diamond VIP',cap:'6〜7名',price:1000000,stroke:'#777',bg:'#222',tc:'#e5e5e5'},
};

let selectedTable = null;
let selectedPay = 'stripe';
let vipTables = [];

async function apiPost(b){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(b)});return r.json();}
async function apiGet(p){const q=new URLSearchParams(p).toString();const r=await fetch(API+'?'+q);return r.json();}

function setLoading(v,txt){
  document.getElementById('loading-overlay').classList.toggle('visible',v);
  if(txt) document.getElementById('loading-text').textContent=txt;
}

window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const eventId = params.get('e') || '';
  if (!eventId) return;
  setLoading(true, 'テーブル情報を読み込み中...');
  try {
    const d = await apiGet({ action:'getVipTables', event_id: eventId });
    if (d.ok) vipTables = d.tables || [];
    updateMapStatus();
  } catch(e) {}
  setLoading(false);
});

function updateMapStatus() {
  vipTables.forEach(t => {
    const el = document.getElementById('svg-' + t.table_name);
    if (!el) return;
    const rect = el.querySelector('rect');
    if (!rect) return;
    const st = String(t.status || '');
    if (st === 'reserved' || st === 'confirmed') {
      rect.setAttribute('fill', '#111');
      rect.setAttribute('opacity', '0.5');
      el.style.cursor = 'not-allowed';
      el.setAttribute('onclick', '');
    } else if (st === 'pending_payment') {
      rect.setAttribute('fill', '#2a1f00');
    }
  });
}

function getTableStatus(tableKey) {
  const t = vipTables.find(v => v.table_name === tableKey);
  return t ? String(t.status || 'available') : 'available';
}

function selectTable(key) {
  const info = TABLE_INFO[key];
  if (!info) return;

  const status = getTableStatus(key);
  if (status === 'reserved' || status === 'confirmed') return;

  // 前の選択をリセット
  if (selectedTable) {
    const prev = document.getElementById('svg-' + selectedTable);
    if (prev) prev.querySelector('rect').setAttribute('stroke-width', '1.5');
  }
  selectedTable = key;

  // 選択状態
  const el = document.getElementById('svg-' + key);
  if (el) el.querySelector('rect').setAttribute('stroke-width', '3');

  // カード表示
  const badge = document.getElementById('tc-badge');
  badge.textContent = info.type;
  badge.style.background = info.bg;
  badge.style.color = info.tc;
  badge.style.borderColor = info.stroke;
  document.getElementById('tc-name').textContent = info.name;
  document.getElementById('tc-cap').textContent = info.cap;
  document.getElementById('tc-price').textContent = '¥' + info.price.toLocaleString();

  const statusMsg = document.getElementById('tc-status-msg');
  let canBook = true;
  if (status === 'pending_payment') {
    statusMsg.textContent = '仮押さえ中（振込待ち）';
    statusMsg.style.background = 'rgba(201,168,76,0.08)';
    statusMsg.style.color = '#C9A84C';
    canBook = false;
  } else {
    statusMsg.textContent = '受付中';
    statusMsg.style.background = 'rgba(76,175,130,0.08)';
    statusMsg.style.color = '#4CAF82';
    canBook = true;
  }

  document.getElementById('table-card').classList.add('visible');
  document.getElementById('btn-to-step2').disabled = !canBook;
  document.getElementById('error-msg').style.display = 'none';
}

function goToStep2() {
  if (!selectedTable) return;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').classList.add('visible');
  document.getElementById('s2-table-name').textContent = selectedTable + ' (' + TABLE_INFO[selectedTable].type + ')';
  document.getElementById('step1-ind').className = 'step done';
  document.getElementById('step2-ind').className = 'step active';
}

function backToStep1() {
  document.getElementById('step2').classList.remove('visible');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step1-ind').className = 'step active';
  document.getElementById('step2-ind').className = 'step';
}

function selectPay(method) {
  selectedPay = method;
  document.getElementById('pay-stripe').classList.toggle('selected', method === 'stripe');
  document.getElementById('pay-transfer').classList.toggle('selected', method === 'transfer');
}

async function submitReservation() {
  const name  = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const errEl = document.getElementById('error-msg2');

  if (!name)  { errEl.textContent='代表者氏名を入力してください';errEl.style.display='block';return; }
  if (!email) { errEl.textContent='メールアドレスを入力してください';errEl.style.display='block';return; }
  if (!phone) { errEl.textContent='電話番号を入力してください';errEl.style.display='block';return; }
  errEl.style.display = 'none';

  const params  = new URLSearchParams(location.search);
  const eventId = params.get('e') || '';
  const info    = TABLE_INFO[selectedTable];

  // テーブルIDを取得
  const tableRow = vipTables.find(v => v.table_name === selectedTable);

  setLoading(true, '予約処理中...');
  try {
    const d = await apiPost({
      action: 'reserveVipTable',
      table_id: tableRow ? tableRow.table_id : '',
      event_id: eventId,
      name, email, phone,
      payment_method: selectedPay
    });

    if (!d.ok) {
      setLoading(false);
      errEl.textContent = d.message || '予約に失敗しました';
      errEl.style.display = 'block';
      return;
    }

    if (selectedPay === 'stripe') {
      // Stripe決済へ遷移
      localStorage.setItem('lpt_vip_guest_id', d.guest_id);
      localStorage.setItem('lpt_vip_table', d.table_name);
      const stripeRes = await fetch(VERCEL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          event_id: eventId,
          event_name: 'LUXE PARTY TOKYO VIP - ' + info.name,
          name, email,
          gender: 'male',
          invited_by: '',
          amount: info.price,
          plan_id: '',
          cancel_url: location.href
        })
      });
      const sData = await stripeRes.json();
      setLoading(false);
      if (sData.ok && sData.checkout_url) {
        location.href = sData.checkout_url;
      } else {
        errEl.textContent = 'Stripe決済の準備に失敗しました';
        errEl.style.display = 'block';
      }
    } else {
      // 振込申込完了
      setLoading(false);
      showResult(d, name, info);
    }
  } catch(e) {
    setLoading(false);
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = 'block';
  }
}

function showResult(d, name, info) {
  document.getElementById('step2').classList.remove('visible');
  const rs = document.getElementById('result-section');
  rs.classList.add('visible');
  document.getElementById('step2-ind').className = 'step done';
  document.getElementById('step3-ind').className = 'step active';

  const badge = document.getElementById('res-badge');
  if (d.payment_method === 'transfer') {
    badge.textContent = '仮予約を受け付けました — 振込確認後に正式確定します';
    badge.className = 'result-badge transfer';
    document.getElementById('res-sub').textContent = '確認メールをお送りしました。3日以内にお振込ください。';
    document.getElementById('transfer-box').style.display = 'block';
    document.getElementById('transfer-body').innerHTML =
      '振込期限: ' + d.transfer_deadline + '<br>振込金額: ¥' + Number(info.price).toLocaleString() + '<br><br>振込先口座はメールをご確認ください。<br>ご入金確認後、QRコード招待状をお送りいたします。';
  } else {
    badge.textContent = '✅ ご予約が確定しました';
    badge.className = 'result-badge';
    document.getElementById('res-sub').textContent = 'QRコード招待状をメールでお送りします。';
  }

  document.getElementById('res-table').textContent = info.name + ' (' + info.type + ')';
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-price').textContent = '¥' + Number(info.price).toLocaleString();
  document.getElementById('res-pay').textContent = d.payment_method === 'transfer' ? '銀行振込' : 'カード決済';
}
</script>
