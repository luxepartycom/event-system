<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE PARTY TOKYO — VIP テーブル予約</title>
<style>
:root{--gold:#C9A84C;--black:#080808;--dark:#111;--dark2:#161616;--white:#F5F0E8;--gray:#888880;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;font-weight:300;min-height:100vh;}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 20%,rgba(201,168,76,0.06) 0%,transparent 70%);}
.wrap{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;padding:48px 20px 80px;}
.logo{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.4em;text-align:center;margin-bottom:2px;}
.logo-sub{font-size:0.48rem;letter-spacing:0.3em;color:var(--gray);text-transform:uppercase;text-align:center;margin-bottom:32px;}
.page-title{font-size:0.6rem;letter-spacing:0.3em;color:var(--gold);text-align:center;margin-bottom:32px;text-transform:uppercase;}

/* Step indicator */
.steps{display:flex;justify-content:center;gap:0;margin-bottom:40px;}
.step{display:flex;align-items:center;gap:8px;font-size:0.52rem;letter-spacing:0.1em;color:#333;}
.step.active{color:var(--gold);}
.step.done{color:#555;}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:0.6rem;}
.step-line{width:32px;height:1px;background:#222;margin:0 4px;}

/* Floor map (display only) */
.map-wrap{margin-bottom:24px;}
.map-label{font-size:0.48rem;letter-spacing:0.2em;color:var(--gray);margin-bottom:10px;text-transform:uppercase;}
.map-svg-wrap{border:1px solid #1e1e1e;background:#0d0d0d;overflow:hidden;}
.map-svg-wrap svg{width:100%;height:auto;display:block;}

/* Rank cards */
.rank-section{margin-bottom:24px;}
.rank-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.rank-card{border:1px solid #222;padding:14px 12px;cursor:pointer;transition:all 0.2s;position:relative;}
.rank-card:hover:not(.full){border-color:#333;}
.rank-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.rank-card.full{opacity:0.35;cursor:not-allowed;}
.rank-card-badge{font-size:0.42rem;letter-spacing:0.1em;padding:2px 7px;border:1px solid;display:inline-block;margin-bottom:7px;border-radius:2px;}
.rank-card-name{font-size:0.78rem;font-weight:500;color:var(--white);margin-bottom:3px;}
.rank-card-info{font-size:0.48rem;color:var(--gray);line-height:1.7;}
.rank-card-price{font-size:0.72rem;color:var(--gold);margin-top:5px;font-weight:500;}
.rank-card-avail{font-size:0.44rem;margin-top:5px;}
.rank-card-avail.ok{color:#4CAF82;}
.rank-card-avail.none{color:#CF4444;}

/* Selected rank info */
.rank-info-card{display:none;background:var(--dark2);border:1px solid rgba(201,168,76,0.3);padding:16px;margin-bottom:20px;}
.rank-info-card.visible{display:block;}

/* Form */
.form-section{display:none;}
.form-section.visible{display:block;}
.form-group{margin-bottom:20px;}
.form-label{font-size:0.5rem;letter-spacing:0.15em;color:var(--gray);display:block;margin-bottom:8px;text-transform:uppercase;}
.form-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.12);padding:10px 0;color:var(--white);font-family:inherit;font-size:0.8rem;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-bottom-color:var(--gold);}
.form-note{font-size:0.5rem;color:var(--gray);margin-top:6px;line-height:1.6;}
.pay-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.pay-opt{border:1px solid #222;padding:14px;cursor:pointer;transition:all 0.2s;}
.pay-opt:hover{border-color:#333;}
.pay-opt.selected{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.pay-opt-icon{font-size:1.2rem;margin-bottom:6px;}
.pay-opt-label{font-size:0.65rem;color:var(--white);font-weight:500;}
.pay-opt-desc{font-size:0.5rem;color:var(--gray);margin-top:3px;line-height:1.5;}
.pay-fixed-banner{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.25);padding:10px 14px;font-size:0.58rem;color:var(--gold);margin-top:8px;line-height:1.6;}

/* Buttons */
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;padding:16px;font-size:0.7rem;letter-spacing:0.2em;cursor:pointer;font-family:inherit;font-weight:500;margin-top:8px;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.88;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn-secondary{width:100%;background:transparent;color:var(--gray);border:1px solid #222;padding:13px;font-size:0.62rem;cursor:pointer;font-family:inherit;margin-top:8px;transition:all 0.2s;}
.btn-secondary:hover{border-color:#333;color:var(--white);}

/* Result */
.result-section{display:none;text-align:center;}
.result-section.visible{display:block;}
.result-badge{background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.3);padding:14px;margin-bottom:24px;font-size:0.65rem;color:#4CAF82;line-height:1.8;}
.result-badge.transfer{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);color:var(--gold);}
.result-title{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;font-size:1.3rem;color:var(--gold);margin-bottom:8px;}
.result-sub{font-size:0.6rem;color:var(--gray);line-height:1.8;margin-bottom:28px;}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.68rem;}
.info-key{color:var(--gray);}
.info-val{color:var(--white);}
.transfer-box{background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-top:20px;text-align:left;}
.transfer-title{font-size:0.5rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:10px;text-transform:uppercase;}
.transfer-body{font-size:0.65rem;color:var(--gray);line-height:2;}

/* Loading */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loading-overlay.visible{display:flex;}
.loading-text{font-size:0.6rem;letter-spacing:0.2em;color:var(--gray);}
.spinner{width:32px;height:32px;border:1px solid #222;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#error-msg{display:none;padding:12px 14px;background:rgba(207,68,68,0.1);border:1px solid rgba(207,68,68,0.3);font-size:0.62rem;color:#CF4444;line-height:1.7;margin-bottom:16px;}
</style>
</head>

<script>
const _PROD_API = 'https://script.google.com/macros/s/AKfycbwlEtY2RZahMNrr6d5cYIcG8p3sXtNDh7_uC-79hC2G4H87Vy9k_cp_yFywmNc1Ogfe/exec';

const RANK_INFO = {
  'Secret VIP': {
    label: 'Secret VIP', color: '#CC2222', bg: '#4a0f0f', tc: '#ffcccc',
    cap: '4〜5名', priceLabel: '¥300,000〜¥500,000', minPrice: 300000,
    tables: ['S1','S2','S3'],
    note: 'バーカウンター最前列の特等席です。テーブルは運営が割り当てます。'
  },
  'VVIP': {
    label: 'VVIP', color: '#3355CC', bg: '#0F2461', tc: '#dbeafe',
    cap: '4〜5名', priceLabel: '¥300,000', minPrice: 300000,
    tables: ['V1','V2','V3','V4','V5','V6'],
    note: 'フロア中央エリアのVIPテーブルです。テーブルは運営が割り当てます。'
  },
  'GOLD VIP': {
    label: 'GOLD VIP', color: '#B8860B', bg: '#3D2800', tc: '#fef3c7',
    cap: '4〜5名', priceLabel: '¥500,000', minPrice: 500000,
    tables: ['G1','G2'],
    note: 'DJ前方のプレミアムゴールドテーブルです。テーブルは運営が割り当てます。'
  },
  'Diamond VIP': {
    label: 'Diamond VIP', color: '#888', bg: '#222', tc: '#e5e5e5',
    cap: '6〜7名', priceLabel: '¥1,000,000', minPrice: 1000000,
    tables: ['D1'],
    note: '最大人数対応のダイヤモンドテーブルです。'
  }
};

const RANK_KEYS = ['Secret VIP', 'VVIP', 'GOLD VIP', 'Diamond VIP'];

let selectedRank = null;
let selectedPay = 'stripe';
let vipTables = [];
let payFixed = null; // URLパラメータで固定された支払い方法

async function apiPost(b){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(b)});return r.json();}
async function apiGet(p){const q=new URLSearchParams(p).toString();const r=await fetch(API+'?'+q);return r.json();}

function setLoading(v,txt){
  document.getElementById('loading-overlay').classList.toggle('visible',v);
  if(txt) document.getElementById('loading-text').textContent=txt;
}

window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const eventId = params.get('e') || '';
  payFixed = params.get('pay') || null; // 'stripe' | 'transfer' | null

  // 支払い方法固定の設定
  if (payFixed === 'stripe' || payFixed === 'transfer') {
    selectedPay = payFixed;
    document.getElementById('pay-selector-wrap').style.display = 'none';
    const banner = document.getElementById('pay-fixed-banner');
    banner.style.display = 'block';
    banner.textContent = payFixed === 'stripe'
      ? '💳 お支払い方法：カード決済（今すぐお支払い・即時予約確定）'
      : '🏦 お支払い方法：銀行振込（3日以内にお振込・確認後QR発行）';
  }

  if (!eventId) { renderRankCards(); return; }
  setLoading(true, 'テーブル情報を読み込み中...');
  try {
    const d = await apiGet({ action:'getVipTables', event_id: eventId });
    if (d.ok) vipTables = d.tables || [];
  } catch(e) {}
  setLoading(false);
  renderRankCards();
});

function getAvailableCount(rankKey) {
  const info = RANK_INFO[rankKey];
  if (!info) return 0;
  if (vipTables.length === 0) return info.tables.length; // データなしは全部空き扱い
  return info.tables.filter(tName => {
    const t = vipTables.find(v => v.table_name === tName);
    if (!t) return true;
    const st = String(t.status || '');
    return st === 'available';
  }).length;
}

function renderRankCards() {
  const container = document.getElementById('rank-cards');
  container.innerHTML = '';
  RANK_KEYS.forEach(rankKey => {
    const info = RANK_INFO[rankKey];
    const avail = getAvailableCount(rankKey);
    const isFull = avail === 0;
    const card = document.createElement('div');
    card.className = 'rank-card' + (isFull ? ' full' : '');
    card.id = 'rank-card-' + rankKey.replace(/ /g,'_');
    card.innerHTML = `
      <div class="rank-card-badge" style="color:${info.tc};border-color:${info.color};background:${info.bg};">${info.label}</div>
      <div class="rank-card-name">${info.label}</div>
      <div class="rank-card-info">収容人数: ${info.cap}</div>
      <div class="rank-card-price">${info.priceLabel}</div>
      <div class="rank-card-avail ${isFull ? 'none' : 'ok'}">${isFull ? '満席' : '残り ' + avail + ' テーブル'}</div>
    `;
    if (!isFull) card.onclick = () => selectRank(rankKey);
    container.appendChild(card);
  });
}

function selectRank(rankKey) {
  const info = RANK_INFO[rankKey];
  if (!info) return;
  if (getAvailableCount(rankKey) === 0) return;

  // 前の選択をリセット
  RANK_KEYS.forEach(k => {
    const el = document.getElementById('rank-card-' + k.replace(/ /g,'_'));
    if (el) el.classList.remove('selected');
  });

  selectedRank = rankKey;
  document.getElementById('rank-card-' + rankKey.replace(/ /g,'_')).classList.add('selected');

  // 情報カード表示
  document.getElementById('ric-badge').textContent = info.label;
  document.getElementById('ric-badge').style.color = info.tc;
  document.getElementById('ric-badge').style.borderColor = info.color;
  document.getElementById('ric-badge').style.background = info.bg;
  document.getElementById('ric-name').textContent = info.label;
  document.getElementById('ric-cap').textContent = info.cap;
  document.getElementById('ric-price').textContent = info.priceLabel;
  document.getElementById('ric-note').textContent = info.note;
  document.getElementById('rank-info-card').classList.add('visible');
  document.getElementById('btn-to-step2').disabled = false;
  document.getElementById('error-msg').style.display = 'none';
}

function goToStep2() {
  if (!selectedRank) return;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').classList.add('visible');
  document.getElementById('s2-rank-name').textContent = selectedRank;
  document.getElementById('step1-ind').className = 'step done';
  document.getElementById('step2-ind').className = 'step active';
}

function backToStep1() {
  document.getElementById('step2').classList.remove('visible');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step1-ind').className = 'step active';
  document.getElementById('step2-ind').className = 'step';
}

function selectPay(method) {
  if (payFixed) return; // 固定時は変更不可
  selectedPay = method;
  document.getElementById('pay-stripe').classList.toggle('selected', method === 'stripe');
  document.getElementById('pay-transfer').classList.toggle('selected', method === 'transfer');
}

async function submitReservation() {
  const name  = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const errEl = document.getElementById('error-msg2');

  if (!name)  { errEl.textContent='代表者氏名を入力してください';errEl.style.display='block';return; }
  if (!email) { errEl.textContent='メールアドレスを入力してください';errEl.style.display='block';return; }
  if (!phone) { errEl.textContent='電話番号を入力してください';errEl.style.display='block';return; }
  errEl.style.display = 'none';

  const params  = new URLSearchParams(location.search);
  const eventId = params.get('e') || '';
  const info    = RANK_INFO[selectedRank];

  setLoading(true, '予約処理中...');
  try {
    const d = await apiPost({
      action: 'reserveVipByRank',
      rank_type: selectedRank,
      event_id: eventId,
      name, email, phone,
      payment_method: selectedPay
    });

    if (!d.ok) {
      setLoading(false);
      errEl.textContent = d.message || '予約に失敗しました';
      errEl.style.display = 'block';
      return;
    }

    if (selectedPay === 'stripe') {
      localStorage.setItem('lpt_vip_guest_id', d.guest_id);
      localStorage.setItem('lpt_vip_table', d.table_name);
      const stripeRes = await fetch(VERCEL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          event_id: eventId,
          event_name: 'LUXE PARTY TOKYO VIP - ' + selectedRank,
          name, email,
          gender: 'male',
          invited_by: '',
          amount: d.price || info.minPrice,
          plan_id: '',
          cancel_url: location.href
        })
      });
      const sData = await stripeRes.json();
      setLoading(false);
      if (sData.ok && sData.checkout_url) {
        location.href = sData.checkout_url;
      } else {
        errEl.textContent = 'Stripe決済の準備に失敗しました';
        errEl.style.display = 'block';
      }
    } else {
      setLoading(false);
      showResult(d, name, d.price || info.minPrice);
    }
  } catch(e) {
    setLoading(false);
    errEl.textContent = '通信エラーが発生しました';
    errEl.style.display = 'block';
  }
}

function showResult(d, name, price) {
  document.getElementById('step2').classList.remove('visible');
  const rs = document.getElementById('result-section');
  rs.classList.add('visible');
  document.getElementById('step2-ind').className = 'step done';
  document.getElementById('step3-ind').className = 'step active';

  const badge = document.getElementById('res-badge');
  if (d.payment_method === 'transfer') {
    badge.textContent = '仮予約を受け付けました — 振込確認後に正式確定します';
    badge.className = 'result-badge transfer';
    document.getElementById('res-sub').textContent = '確認メールをお送りしました。3日以内にお振込ください。';
    document.getElementById('transfer-box').style.display = 'block';
    document.getElementById('transfer-body').innerHTML =
      '振込期限: ' + d.transfer_deadline + '<br>振込金額: ¥' + Number(price).toLocaleString() + '<br><br>振込先口座はメールをご確認ください。<br>ご入金確認後、QRコード招待状をお送りいたします。';
  } else {
    badge.textContent = '✅ ご予約が確定しました';
    badge.className = 'result-badge';
    document.getElementById('res-sub').textContent = 'QRコード招待状をメールでお送りします。';
  }

  document.getElementById('res-rank').textContent = selectedRank + (d.table_name ? ' (' + d.table_name + ')' : '');
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-price').textContent = '¥' + Number(price).toLocaleString();
  document.getElementById('res-pay').textContent = d.payment_method === 'transfer' ? '銀行振込' : 'カード決済';
}
</script>
