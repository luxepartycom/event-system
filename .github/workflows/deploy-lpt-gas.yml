name: Deploy LPT GAS

on:
  push:
    branches: [main]
    paths:
      - 'gas/**'
  workflow_dispatch:
    inputs:
      reason:
        description: '手動実行の理由'
        required: false
        default: 'CEO手動トリガー'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2

      - name: Write CLASPRC
        env:
          LPT_CLASP_TOKEN: ${{ secrets.LPT_CLASP_TOKEN }}
        run: printf '%s' "$LPT_CLASP_TOKEN" > ~/.clasprc.json

      - name: Push to GAS
        working-directory: gas
        run: clasp push --force

      - name: Deploy
        working-directory: gas
        env:
          DEPLOY_ID: ${{ secrets.LPT_GAS_DEPLOYMENT_ID }}
        run: |
          if [ -n "$DEPLOY_ID" ]; then
            clasp deploy \
              --deploymentId "$DEPLOY_ID" \
              --description "Auto deploy $(date +%Y-%m-%d %H:%M)"
          fi
